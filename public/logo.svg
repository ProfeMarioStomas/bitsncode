<svg width="100" height="100" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Definición del degradado verde -->
  <defs>
    <linearGradient id="greenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
  </defs>

  <!-- Triángulo de Reuleaux -->
  <!-- Formado por tres arcos circulares perfectos -->
  <path
    d="M100 40
       A 115.47 115.47 0 0 1 157.73 140
       A 115.47 115.47 0 0 1 42.27 140
       A 115.47 115.47 0 0 1 100 40 Z"
    fill="none"
    stroke="url(#greenGradient)"
    stroke-width="12"
    stroke-linejoin="round"
  />

  <!-- El Core (Centro Lógico) -->
  <circle cx="100" cy="110" r="16" fill="#10B981" />

  <!-- Detalle del 'Bit' central -->
  <rect x="95" y="105" width="10" height="10" rx="1" fill="white" />

  <!-- Aura sutil -->
  <circle cx="100" cy="110" r="24" stroke="#10B981" stroke-width="1" opacity="0.3" />
</svg>
